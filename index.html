<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grading System</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-sky-200 via-emerald-200 to-green-200 text-slate-800">

<!-- NAVBAR -->
<header class="bg-white/80 border-b border-emerald-200 p-4">
  <h1 class="text-xl font-bold text-center">📊 Krizza Mae Samorillo Grading System</h1>
</header>

<!-- MAIN -->
<main class="max-w-4xl mx-auto p-6">

  <!-- CARD -->
  <div class="bg-white/80 p-6 rounded-2xl shadow-lg border border-emerald-200">

    <h2 class="text-lg mb-4 font-semibold">Enter Grades</h2>

    <form id="grade-form" class="space-y-4">

      <input id="student-name" type="text" placeholder="Student Name"
        class="w-full p-3 rounded-lg bg-emerald-100" required>

      <div class="grid md:grid-cols-2 gap-4">
        <input id="quiz" type="number" max="100" placeholder="Quiz (20%)" class="p-3 rounded-lg bg-emerald-100">
        <input id="lab" type="number" max="100" placeholder="Laboratory (30%)" class="p-3 rounded-lg bg-emerald-100">
        <input id="assignment" type="number" max="100" placeholder="Assignment (10%)" class="p-3 rounded-lg bg-emerald-100">
        <input id="attendance" type="number" max="100" placeholder="Attendance (10%)" class="p-3 rounded-lg bg-emerald-100">
        <input id="exam" type="number" max="100" placeholder="Major Exam (30%)" class="p-3 rounded-lg bg-emerald-100">
      </div>

      <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-lg">
        Calculate Grade
      </button>

    </form>

      
  </div>

  <!-- RESULT TABLE -->
  <div class="mt-8 bg-white/80 p-6 rounded-2xl shadow-lg border border-emerald-200">
    <h2 class="text-lg mb-4 font-semibold">Results</h2>

    <div class="overflow-x-auto">
      <table class="w-full text-center">
        <thead class="border-b border-slate-700">
          <tr>
            <th class="p-2">Name</th>
            <th>Quiz</th>
            <th>Lab</th>
            <th>Assign</th>
            <th>Attend</th>
            <th>Exam</th>
            <th>Final</th>
            
          </tr>
        </thead>
        <tbody id="final-body"></tbody>
      </table>
    </div>
  </div>

</main>

<!-- FOOTER -->
<footer class="text-center text-emerald-600 text-sm p-4">
  © 2026 Grading System
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://ssfcrcmikmatkuxirlcm.supabase.co';
const SUPABASE_ANON_KEY = 'YOUR_KEY_HERE';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const form = document.getElementById('grade-form');
const tableBody = document.getElementById('final-body');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const name = document.getElementById('student-name').value;
  const quiz = parseFloat(document.getElementById('quiz').value);
  const lab = parseFloat(document.getElementById('lab').value);
  const assignment = parseFloat(document.getElementById('assignment').value);
  const attendance = parseFloat(document.getElementById('attendance').value);
  const exam = parseFloat(document.getElementById('exam').value);

  if ([quiz, lab, assignment, attendance, exam].some(isNaN)) {
    alert("Fill all fields!");
    return;
  }

  if ([quiz, lab, assignment, attendance, exam].some(v => v < 0 || v > 100)) {
    alert("Scores must be between 0 and 100 only!");
    return;
  }

  const final = (quiz*0.2)+(lab*0.3)+(assignment*0.1)+(attendance*0.1)+(exam*0.3);

  tableBody.innerHTML += `
    <tr class="border-b border-emerald-200">
      <td class="p-2">${name}</td>
      <td>${quiz}</td>
      <td>${lab}</td>
      <td>${assignment}</td>
      <td>${attendance}</td>
      <td>${exam}</td>
      <td class="font-bold ${final >= 75 ? 'text-emerald-400' : 'text-rose-400'}">
        ${final.toFixed(2)} (${final >= 75 ? 'Passed' : 'Failed'})
      </td>
    </tr>
  `;

  await db.from('grades').insert([{
    student_name:name, quiz, lab, assignment, attendance, exam, final_grade:final
  }]);
});





</script>

</body>
</html>
